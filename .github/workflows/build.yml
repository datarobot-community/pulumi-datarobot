name: Build

on:
  workflow_call:
    inputs: {}
  pull_request:
    branches:
    - main
    - v*
    - feature*
    paths-ignore:
    - CHANGELOG.md

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CGO_ENABLED: 0

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

    - name: Install go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        # The versions of golangci-lint and setup-go here cross-depend and need to update together.
        go-version-file: provider/go.mod
        # Either this action or golangci-lint needs to disable the cache
        cache: true

    - name: disarm go:embed directives to enable lint
      continue-on-error: true # this fails if there are no go:embed directives
      run: |
        git grep -l 'go:embed' -- provider | xargs sed -i 's/go:embed/ goembed/g'

    - name: prepare upstream
      continue-on-error: true
      run: make upstream

    - name: Download dependencies
      run: make tidy

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: latest # Ensures the latest v2 version is used
        working-directory: provider
        skip-cache: true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

    - name: Checkout Repo
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

    - name: Unshallow clone for tags
      run: git fetch --prune --unshallow --tags

    - name: Install go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        # The versions of golangci-lint and setup-go here cross-depend and need to update together.
        go-version-file: provider/go.mod
        # Either this action or golangci-lint needs to disable the cache
        cache: true

    - name: Install pulumictl
      uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8
      with:
        repo: pulumi/pulumictl

    - name: Download dependencies
      run: make tidy

    - name: Build
      run: make tfgen

    - name: Test
      run: make test

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Repo
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

    - name: Dependency Review
      if: github.event_name == 'pull_request'
      uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4

    - name: Install go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: provider/go.mod
        cache: true

    - name: Run govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...
      working-directory: provider

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '20'

    - name: npm audit
      run: |
        npm install --package-lock-only
        npm audit --audit-level=high
      working-directory: sdk/nodejs

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.x'

    - name: pip-audit
      run: |
        pip install pip-audit
        pip-audit -e .
      working-directory: sdk/python
